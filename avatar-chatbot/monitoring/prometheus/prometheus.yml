global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'gateway'
    static_configs:
      - targets: ['gateway:8000']
    metrics_path: '/metrics'

  - job_name: 'nats'
    static_configs:
      - targets: ['nats:8222']

  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']

  - job_name: 'qdrant'
    static_configs:
      - targets: ['qdrant:6333']

  - job_name: 'vllm'
    static_configs:
      - targets: ['vllm:8000']

  - job_name: 'asr-service'
    static_configs:
      - targets: ['asr-service:8080']

  - job_name: 'tts-service'
    static_configs:
      - targets: ['tts-service:8080']

  - job_name: 'rag-service'
    static_configs:
      - targets: ['rag-service:8080']

  - job_name: 'inference-gateway'
    static_configs:
      - targets: ['inference-gateway:8080']

  - job_name: 'session-manager'
    static_configs:
      - targets: ['session-manager:8080']