services:
  gateway:
    build:
      context: .
      dockerfile: services/gateway/Dockerfile.dev
    ports:
      - "8000:8000"
    environment:
      - NATS_HOST=nats
      - REDIS_HOST=redis
    depends_on:
      - nats
      - redis
    restart: unless-stopped

  session-manager:
    build:
      context: .
      dockerfile: services/session-manager/Dockerfile
    environment:
      - NATS_URL=nats://nats:4222
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - nats
      - redis
    restart: unless-stopped

  accent-router:
    build:
      context: .
      dockerfile: services/accent-router/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  intent-service:
    build:
      context: .
      dockerfile: services/intent-service/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  asr-service:
    build:
      context: .
      dockerfile: services/asr-service/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  tts-service:
    build:
      context: .
      dockerfile: services/tts-service/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  rag-service:
    build:
      context: .
      dockerfile: services/rag-service/Dockerfile
    environment:
      - NATS_HOST=nats
      - QDRANT_HOST=qdrant
      - OPENSEARCH_HOST=opensearch
    depends_on:
      - nats
      - qdrant
      - opensearch
    restart: unless-stopped

  inference-gateway:
    build:
      context: .
      dockerfile: services/inference-gateway/Dockerfile
    environment:
      - NATS_HOST=nats
      - VLLM_BASE_URL=http://vllm:8000/v1
    depends_on:
      - nats
    restart: unless-stopped

  memory-service:
    build:
      context: .
      dockerfile: services/memory-service/Dockerfile
    environment:
      - NATS_HOST=nats
      - REDIS_HOST=redis
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=chatbot
      - POSTGRES_PASSWORD=chatbot_secret
      - POSTGRES_DB=chatbot
    depends_on:
      - nats
      - redis
      - postgres
      - qdrant
    restart: unless-stopped

  document-processor:
    build:
      context: .
      dockerfile: services/document-processor/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  avatar-adapter:
    build:
      context: .
      dockerfile: services/avatar-adapter/Dockerfile
    environment:
      - NATS_HOST=nats
    depends_on:
      - nats
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_WS_URL=ws://localhost:8000/ws
    depends_on:
      - gateway
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
    restart: unless-stopped

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686"
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    restart: unless-stopped