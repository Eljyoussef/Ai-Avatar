name: Docker Build & Push

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - gateway
          - asr-service
          - tts-service
          - rag-service
          - inference-gateway
          - memory-service
          - accent-router
          - intent-service
          - avatar-adapter
          - document-processor

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: services/${{ matrix.service }}/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/avatar-chatbot-${{ matrix.service }}:latest
            ${{ secrets.DOCKER_USERNAME }}/avatar-chatbot-${{ matrix.service }}:${{ github.ref_name }}